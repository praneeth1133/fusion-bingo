<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fusion Bingo - Pick Your Card</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: RGBA(253, 245, 235, 1);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #1B2A4A;
    padding: 20px;
  }
  .container {
    max-width: 520px;
    width: 100%;
  }
  h1 {
    font-size: 32px;
    font-weight: 700;
    color: #1B2A4A;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 15px;
    color: #666;
    margin-bottom: 28px;
  }
  .btn-pick {
    display: inline-block;
    padding: 18px 44px;
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    background: linear-gradient(135deg, #3B8C7D 0%, #2a7a6b 100%);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 18px rgba(59,140,125,0.35);
    letter-spacing: 0.3px;
  }
  .btn-pick:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(59,140,125,0.5); }
  .btn-pick:active { transform: translateY(0); }
  .spinner {
    width: 44px; height: 44px;
    border: 4px solid #9B7EC8;
    border-top-color: #1B2A4A;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 24px auto;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #card-display { margin-top: 28px; display: none; }
  .card-label {
    font-size: 64px;
    font-weight: 800;
    margin-bottom: 6px;
    color: #E8734A;
    line-height: 1;
  }
  .card-sublabel {
    font-size: 18px;
    color: #666;
    margin-bottom: 20px;
  }
  .btn-download {
    display: inline-block;
    padding: 12px 32px;
    font-size: 15px;
    font-weight: 600;
    color: #E8734A;
    background: #FDF5EB;
    border: 2px solid #E8734A;
    border-radius: 10px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s;
  }
  .btn-download:hover { background: #fde8d8; }
  .pick-again { margin-top: 18px; }
  .pick-again .btn-pick { font-size: 15px; padding: 12px 28px; }
  .err { color: #c0392b; font-size: 14px; margin-top: 14px; }
</style>
</head>
<body>
  <div class="container">
    <h1>Fusion Bingo</h1>
    <p class="subtitle">AAPI &amp; Allies ERG &bull; One Year Anniversary</p>

    <div id="initial-view">
      <button class="btn-pick" id="pickBtn" onclick="pickCard()">Pick Your Bingo Card!</button>
    </div>

    <div class="spinner" id="spinner"></div>
    <p class="err" id="err"></p>

    <div id="card-display">
      <p class="card-label" id="card-label"></p>
      <p class="card-sublabel">is your bingo card!</p>
      <a class="btn-download" id="download-link" target="_blank">Open Your Card</a>
      <div class="pick-again">
        <button class="btn-pick" onclick="pickCard()">Pick Another Card</button>
      </div>
    </div>
  </div>

<script>
  var BASE_URL = 'https://swgas.sharepoint.com/sites/fusionerg/Shared Documents/2026.06.02 - Anniversary Event/Bingo Cards/';
  var TOTAL_CARDS = 75;

  function pickCard() {
    var cardDisplay = document.getElementById('card-display');
    var initialView = document.getElementById('initial-view');

    initialView.style.display = 'none';
    cardDisplay.style.display = 'none';

    var buf = new Uint32Array(1);
    crypto.getRandomValues(buf);
    var cardNum = (buf[0] % TOTAL_CARDS) + 1;

    var imgUrl = BASE_URL + cardNum + '.png';

    document.getElementById('card-label').textContent = '#' + cardNum;
    document.getElementById('download-link').href = imgUrl;
    cardDisplay.style.display = 'block';
  }
</script>
</body>
</html>
